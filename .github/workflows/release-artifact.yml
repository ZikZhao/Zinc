name: Release Build Artifact

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux-x86-64:
    name: Build zinc (linux-x86-64)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      CC: gcc-14
      CXX: g++-14
      VCPKG_DEFAULT_BINARY_CACHE: ${{ github.workspace }}/.cache/vcpkg/archives

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system packages
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build openjdk-17-jre gcc-14 g++-14

      - name: Set GCC 14 as default compiler
        run: |
          sudo update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-14 140
          sudo update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-14 140
          sudo ln -sf /usr/bin/g++-14 /usr/bin/c++

      - name: Show compiler version
        run: |
          gcc --version
          g++ --version
          c++ --version

      - name: Cache vcpkg archives and installed libs
        uses: actions/cache@v4
        with:
          path: |
            ${{ github.workspace }}/.cache/vcpkg/archives
            ~/vcpkg/installed
          key: ${{ runner.os }}-vcpkg-x64-linux-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json') }}
          restore-keys: |
            ${{ runner.os }}-vcpkg-x64-linux-

      - name: Prepare vcpkg binary cache directory
        run: |
          mkdir -p "$VCPKG_DEFAULT_BINARY_CACHE"

      - name: Bootstrap vcpkg
        run: |
          if [ ! -d "$HOME/vcpkg" ]; then
            git clone https://github.com/microsoft/vcpkg "$HOME/vcpkg"
          fi
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics

      - name: Install C++ dependencies via vcpkg
        run: |
          "$HOME/vcpkg/vcpkg" install antlr4 gtest benchmark --triplet x64-linux

      - name: Configure release
        run: |
          cmake --preset release \
            -DCMAKE_C_COMPILER=gcc-14 \
            -DCMAKE_CXX_COMPILER=g++-14

      - name: Build release executable
        run: cmake --build --preset release --target zinc --parallel

      - name: Prepare artifact files
        run: |
          mkdir -p dist
          cp build/release/bin/zinc dist/zinc-linux-x86-64
          chmod +x dist/zinc-linux-x86-64
          strip dist/zinc-linux-x86-64 || true
          sha256sum dist/zinc-linux-x86-64 > dist/zinc-linux-x86-64.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zinc-linux-x86-64
          path: |
            dist/zinc-linux-x86-64
            dist/zinc-linux-x86-64.sha256
          if-no-files-found: error
          retention-days: 14

  release:
    name: Publish GitHub Release
    needs: build-linux-x86-64
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: release
    permissions:
      contents: write
      attestations: write
      id-token: write

    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: zinc-linux-x86-64
          path: release-assets

      - name: Attest zinc binary provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: release-assets/zinc-linux-x86-64

      - name: Attest checksum provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: release-assets/zinc-linux-x86-64.sha256

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" \
              release-assets/zinc-linux-x86-64 \
              release-assets/zinc-linux-x86-64.sha256 \
              --clobber
          else
            gh release create "$TAG" \
              release-assets/zinc-linux-x86-64 \
              release-assets/zinc-linux-x86-64.sha256 \
              --title "$TAG" \
              --generate-notes
          fi